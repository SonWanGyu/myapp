apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      labels:
        app: spring-boot
    spec:
      containers:
      - name: spring-boot
        image: host.minikube.internal:5000/myapp-spring-boot:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: GEMINI_API_KEY
          value: "AIzaSyCasJllgEs0myoAaQ7TrgoPFExd3FbN9zw"
        resources:
          requests:
            cpu: "200m"
            memory: "384Mi"
          limits:
            cpu: "1000m"
            memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
spec:
  type: NodePort
  selector:
    app: spring-boot
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
