apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      labels:
        app: spring-boot
    spec:
      containers:
      - name: spring-boot
        image: host.minikube.internal:5000/myapp-spring-boot:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "200m"       # 최소 CPU 0.2코어 요청
            memory: "256Mi"
          limits:
            cpu: "500m"       # 최대 CPU 0.5코어 제한
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
spec:
  type: NodePort
  selector:
    app: spring-boot
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
