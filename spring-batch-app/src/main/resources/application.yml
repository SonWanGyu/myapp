spring:
  datasource:
    url: jdbc:oracle:thin:@host.minikube.internal:1521/XEPDB1
    username: myuser
    password: mypassword
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.Oracle12cDialect
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8081
