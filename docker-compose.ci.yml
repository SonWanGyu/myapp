version: '3.8'

services:
  # 1. Private Docker Registry (로컬 이미지 저장소)
  registry:
    image: registry:2
    container_name: local-registry
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

  # 2. Jenkins Server (CI/CD 자동화 서버) - docker/kubectl 내장 커스텀 이미지
  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins-server
    restart: always
    privileged: true
    user: root
    ports:
      - "8090:8080" # Windows 브라우저에서 접속할 Jenkins Web GUI 포트
      - "50000:50000" # Jenkins 빌드 노드 통신용
    volumes:
      - jenkins-data:/var/jenkins_home
      # 리눅스 호스트의 Docker 엔진을 Jenkins 컨테이너 내부에서도 쓸 수 있도록 소켓 마운트 (DooD 방식)
      - /var/run/docker.sock:/var/run/docker.sock

  # 3. Oracle XE Database
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    restart: always
    environment:
      - ORACLE_PASSWORD=mypassword
      - APP_USER=myuser
      - APP_USER_PASSWORD=mypassword
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  registry-data:
  jenkins-data:
  oracle-data:
