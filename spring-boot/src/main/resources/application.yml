spring:
  datasource:
    url: jdbc:oracle:thin:@host.minikube.internal:1521/XEPDB1
    driver-class-name: oracle.jdbc.OracleDriver
    username: myuser
    password: mypassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

gemini:
  api:
    key: ${GEMINI_API_KEY:none}
